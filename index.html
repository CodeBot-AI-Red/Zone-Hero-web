<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zone Hero</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #canvas { display: block; width: 100vw; height: 100vh; }
        .loading { position: absolute; top: 50%; left: 50%; color: white; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="loading" id="loading">Carregando jogo...</div>
    <script src="godot.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const loading = document.getElementById('loading');
        const engine = new Engine();
        engine.setProgressFunc((current, total) => {
            // update loading
        });
        engine.startGame({
            args: ['--main-pack', 'ZoneHero.pck'],
            canvas: canvas,
            onProgress: (progress) => {
                if (progress >= 1) loading.style.display = 'none';
            }
        }).then(() => {
            console.log('Godot started');
        }).catch(err => {
            console.error('Godot error:', err);
            loading.textContent = 'Erro ao carregar: ' + err.message;
        });
    </script>
</body>
</html>
